<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Practice Page</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    padding: 20px;
    margin: 0;
  }

  h2 {
    margin-bottom: 15px;
    font-size: 2rem;
    color: #222;
    text-align: center;
  }

  #instruction {
    font-weight: bold;
    font-size: 1.2rem;
    color: #d33;
    margin-bottom: 15px;
    text-align: center;
  }

  .card {
    width: 80%;
    max-width: 700px;
    background-color: #fff;
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 15px 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  #color-container label {
    font-weight: bold;
    margin-right: 10px;
  }
  #color-container select {
    font-size: 1rem;
    padding: 5px 8px;
  }

  #video-container {
    position: relative;
    width: 720px;
    max-width: 90vw;
    height: 405px;
    margin-bottom: 20px;
    border: 3px solid #aaa;
    border-radius: 8px;
    background-color: #000;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  #drawCanvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: auto;
    border-radius: 8px;
  }

  button {
    padding: 12px 25px;
    font-size: 1.15rem;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    transition: background 0.2s;
  }

  #playBtn { background-color: #4CAF50; color: white; margin-bottom: 20px; }
  #playBtn:hover { background-color: #45a049; }

  #retryBtn { background-color: #FF9800; color: white; }
  #retryBtn:hover { background-color: #fb8c00; }

  #startBtn { background-color: #2196F3; color: white; }
  #startBtn:hover { background-color: #1976d2; }

  
  /* Yes/No質問 */
  #yesno-container label, #count-container label {
    font-weight: bold;
    margin-bottom: 5px;
  }
  #yesno-container input[type="radio"] {
    margin-left: 10px;
    margin-right: 5px;
    transform: scale(1.2);
  }
  #count-container input[type="number"] {
    margin-top: 5px;
    width: 80px;
    padding: 4px 6px;
    font-size: 1rem;
  }

  #slider-container label {
    font-weight: bold;
    font-size: 1rem;
    margin-bottom: 10px;
    display: block;
  }
  #rating {
    width: 100%;
    margin-bottom: 5px;
  }
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 0.95rem;
  }

  #rating-value-display {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
    color: #d33;
  }

  #status {
    font-size: 1rem;
    color: #d00;
    text-align: center;
    min-height: 24px;
  }

  #actionButtons {
    display: flex;
    gap: 20px;
    margin-top: 15px;
  }
</style>
</head>
<body>

<h2>Practice Page</h2>

<p style="font-weight:bold; color:#000; text-align:center;">
  Please use the "<span style="color:#000;">1.Red</span> pen" in this trial.
</p>

<div class="card" id="color-container">
  <label for="penColor">Select pen color:</label>
  <select id="penColor"></select>
</div>

<div id="video-container">
  <video id="video" width="720" height="405"></video>
  <canvas id="drawCanvas" width="720" height="405"></canvas>
</div>

<button id="playBtn">Play Video</button>

<div class="card" id="yesno-container">
  <label>Did you feel the presence of an instrument?</label>
  <div>
    <input type="radio" id="yes" name="instrument" value="yes" checked>
    <label for="yes">Yes</label>
    <input type="radio" id="no" name="instrument" value="no">
    <label for="no">No</label>
  </div>
</div>


<div class="card" id="count-container">
  <label for="instrument-count">If yes, how many instruments did you perceive?</label>
  <input type="number" id="instrument-count" name="instrument-count" min="0" value="0">
</div>

<div class="card" id="slider-container">
  <label for="rating" id="rating-label">How interesting did you find this performance?</label>
  <input type="range" id="rating" name="rating" min="1" max="7" value="4">
  <div class="slider-ticks">
    <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
  </div>
  <div id="rating-value-display">Your rating: <span id="rating-value">4</span></div>
</div>

<div id="actionButtons">
  <button id="retryBtn">Practice Again</button>
  <button id="startBtn">Start Main Experiment</button>
</div>


<script>
const colorList = [
  { num: 1, name: "Red", code: "rgba(255,0,0,0.7)" },
  { num: 2, name: "Blue", code: "rgba(0,0,255,0.7)" },
  { num: 3, name: "Green", code: "rgba(0,255,0,0.7)" },
  { num: 4, name: "Yellow", code: "rgba(255,255,0,0.7)" },
  { num: 5, name: "Cyan", code: "rgba(0,255,255,0.7)" },
  { num: 6, name: "Magenta", code: "rgba(255,0,255,0.7)" },
  { num: 7, name: "Orange", code: "rgba(255,165,0,0.7)" },
  { num: 8, name: "Purple", code: "rgba(128,0,128,0.7)" },
  { num: 9, name: "Brown", code: "rgba(165,42,42,0.7)" },
  { num:10, name: "Black", code: "rgba(0,0,0,0.7)" }
];

const penColor = document.getElementById("penColor");
// 常に赤色に固定
colorList.forEach(c=>{
  const opt = document.createElement("option");
  opt.value = c.code;
  opt.textContent = c.name;
  opt.style.color = c.name.toLowerCase();
  penColor.appendChild(opt);
});

const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
const videoEl = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const ratingEl = document.getElementById("rating");
const ratingValue = document.getElementById("rating-value");
const actionButtons = document.getElementById("actionButtons");
const retryBtn = document.getElementById("retryBtn");
const startBtn = document.getElementById("startBtn");
const status = document.getElementById("status");

let points = [];
let drawing = false;
let currentColor = penColor.value;

function drawBackground() { ctx.clearRect(0,0,canvas.width,canvas.height); }

penColor.addEventListener("change", () => {
  currentColor = penColor.value;
});


// --- ★ participantId の取得ロジック（修正・統合） ---
function getParticipantIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('pid'); 
}

const participantId = getParticipantIdFromUrl();

if (!participantId) {
  status.textContent = "Error: Participant ID not found. Please start over from the introduction page.";
  nextBtn.disabled = true;
  playBtn.disabled = true;
  throw new Error("Participant ID not found.");
}
// --- participantId の取得ロジック終了 ---


canvas.addEventListener("mousedown", ()=>drawing=true);
canvas.addEventListener("mouseup", ()=>drawing=false);
canvas.addEventListener("mousemove", e => { if(drawing) draw(e); });

function draw(e){
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  ctx.fillStyle = currentColor;
  ctx.beginPath();
  ctx.arc(x,y,5,0,Math.PI*2);
  ctx.fill();
  points.push({x,y,t:videoEl.currentTime, color: currentColor});
}

ratingEl.addEventListener("input", ()=>{ ratingValue.textContent = ratingEl.value; });

playBtn.addEventListener("click", async ()=>{
  try{
    videoEl.muted=false;
    await videoEl.play();
    playBtn.disabled=true;
  }catch(e){ console.error(e); status.textContent="Playback error. Please try again."; }
});

videoEl.addEventListener("pause", ()=>{ if(!videoEl.ended) videoEl.play(); });
videoEl.addEventListener("ended", ()=>{
  status.textContent="Practice video ended.";
  actionButtons.style.display="flex";
});

retryBtn.addEventListener("click", () => {
  window.location.href = `test.html?pid=${participantId}`; 
});


startBtn.addEventListener("click", ()=>{ 
  window.location.href = `experiment.html?pid=${participantId}`; 
  //window.location.href="experiment.html"; 
});

videoEl.src = "test.mp4";
drawBackground();
</script>
</body>
</html>
