<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DMI Experiment</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    background-color: #f0f2f5;
    padding: 20px;
    margin: 0;
  }

  h2 {
    margin-bottom: 15px;
    font-size: 2rem;
    color: #222;
    text-align: center;
  }

  #instruction {
    font-weight: bold;
    font-size: 1.3rem;
    color: #333;
    margin-bottom: 15px;
    text-align: center;
  }

  #expectedColorText {
    color: #333;
  }

  #SliderColorText {
    color: #d33;
  }

  /* 共通カード風スタイル */
  .card {
    width: 80%;
    max-width: 700px;
    background-color: #fff;
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 15px 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }

  /* ペン色選択 */
  #color-container {
    font-size: 1.15rem;
  }
  #color-container select {
    font-size: 1rem;
    padding: 6px 8px;
    margin-left: 10px;
  }

  /* 動画＋描画レイヤ */
  #video-container {
    position: relative;
    width: 720px;
    max-width: 90vw;
    height: 405px;
    margin-bottom: 20px;
    border: 3px solid #aaa;
    border-radius: 8px;
    background-color: #000;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  #drawCanvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: auto;
    border-radius: 8px;
  }

  #playBtn {
    margin-bottom: 30px;
    padding: 12px 25px;
    font-size: 1.15rem;
    font-weight: bold;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    transition: background 0.2s;
  }
  #playBtn:hover { background-color: #45a049; }

  /* スライダー */
  #slider-container label {
    font-weight: bold;
    font-size: 1rem;
    margin-bottom: 10px;
    display: block;
  }
  #rating {
    width: 100%;
    height: 25px;
    margin-bottom: 10px;
  }
  #rating-value-display {
    font-size: 1.2rem;
    font-weight: bold;
  }

  /* Yes/No質問 */
  #yesno-container label, #count-container label {
    font-weight: bold;
    margin-bottom: 5px;
  }
  #yesno-container input[type="radio"] {
    margin-left: 10px;
    margin-right: 5px;
    transform: scale(1.2);
  }
  #count-container input[type="number"] {
    margin-top: 5px;
    width: 80px;
    padding: 4px 6px;
    font-size: 1rem;
  }

  /* 次ページボタン */
  #button-container {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 25px;
  }
  #button-container button {
    padding: 12px 25px;
    font-size: 1.15rem;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background-color: #2196F3;
    color: white;
    transition: background 0.2s;
  }
  #button-container button:hover { background-color: #1976d2; }

  /* ステータス表示 */
  #status {
    font-size: 1rem;
    color: #d00;
    text-align: center;
    min-height: 24px;
  }
</style>
</head>
<body>

<h2>DMI Performance Evaluation</h2>

<p id="instruction">
  Please use the "<span id="expectedColorText">1. Red</span> pen" in this trial.
</p>

<div class="card" id="color-container">
  <label for="penColor">Select pen color: </label>
  <select id="penColor"></select>
</div>

<div id="video-container">
  <video id="video" width="720" height="405"></video>
  <canvas id="drawCanvas" width="720" height="405"></canvas>
</div>

<p id="instruction">The video plays only once. Are you ready?</p>
<button id="playBtn">Play Video</button>



<div class="card" id="yesno-container">
  <label>Did you feel the presence of an instrument?</label>
  <div>
    <input type="radio" id="yes" name="instrument" value="yes" checked>
    <label for="yes">Yes</label>
    <input type="radio" id="no" name="instrument" value="no">
    <label for="no">No</label>
  </div>
</div>

<div class="card" id="count-container">
  <label for="instrument-count">If yes, how many instruments did you perceive?</label>
  <input type="number" id="instrument-count" name="instrument-count" min="0" value="0">
</div>



<div class="card" id="slider-container">
  <label for="rating" id="rating-label">
    How interesting did you find this performance?
  </label>
  <div class="slider-wrapper" style="position: relative; width: 100%;">
    <!-- 左右ラベル -->
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.95rem;">
      <span>1=Not at all interesting</span>
      <span>7=Very interesting</span>
    </div>

    <input type="range" id="rating" name="rating" min="1" max="7" value="4" style="width: 100%;">

    <!-- 目盛り数字 -->
    <div class="slider-ticks" style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.95rem;">
      <span>1</span>
      <span>2</span>
      <span>3</span>
      <span>4</span>
      <span>5</span>
      <span>6</span>
      <span>7</span>
    </div>
  </div>

  <div id="rating-value-display" style="margin-top: 10px; font-weight: bold;">
    <span id="SliderColorText">Your rating: <span id="rating-value">4</span></span>
  </div>
</div>



<div id="button-container">
  <button id="nextBtn">Next Page</button>
</div>

<p id="status"></p>

<script src="script.js"></script>
</body>
</html>
